csr_ospf_router_id: 1.1.1.1
# R1 Gi1–R2 Gi1 (10.0.12.0/24), R1 Gi3–R3 Gi3 (10.0.13.0/24), Gi4 lab cloud 10.0.0.0/24 = ansible_host (OSPF passive).
csr_ospf_interfaces:
  - interface: GigabitEthernet1
    ipv4: 10.0.12.1
    netmask: 255.255.255.0
    passive: false
    description: basic_netai P2P csr01 Gi1 to csr02 Gi1
  - interface: GigabitEthernet3
    ipv4: 10.0.13.1
    netmask: 255.255.255.0
    passive: false
    description: basic_netai P2P csr01 Gi3 to csr03 Gi3
  - interface: GigabitEthernet4
    ipv4: 10.0.0.20
    netmask: 255.255.255.0
    passive: true
    description: basic_netai lab cloud 10.0.0.0/24 (matches ansible_host)
