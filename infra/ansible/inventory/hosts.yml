# Align hostnames with docs/inventory/it-assets.yaml and network_lab inventory YAML.
# ansible_host = Gi4 primary in site_routing (10.0.0.0/24 lab cloud) — must match csr_ospf_interfaces Gi4 ipv4 per host.
all:
  children:
    csr_lab:
      hosts:
        csr01:
          ansible_host: 10.0.0.20
        csr02:
          ansible_host: 10.0.0.25
        csr03:
          ansible_host: 10.0.0.22
      vars:
        ansible_network_os: ios
