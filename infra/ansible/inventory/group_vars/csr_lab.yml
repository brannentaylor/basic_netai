---
# Connection (env-driven password matches python `.env.example`).
ansible_connection: ansible.netcommon.network_cli
ansible_user: "{{ lookup('env', 'CSR_SSH_USERNAME') | default('cisco', true) }}"
ansible_password: "{{ lookup('env', 'CSR_SSH_PASSWORD') | default('', true) }}"
ansible_become: false
ansible_become_method: enable

# Syslog receiver = this Ubuntu host on the lab /24 (verify: `ip -br -4 addr`).
lab_syslog_collector_ipv4: 10.0.0.21

# Optional: `logging source-interface <iface>` — leave empty to let IOS choose.
# Point at an interface that can reach lab_syslog_collector_ipv4 (10.0.0.0/24), not a P2P stub.
csr_logging_source_interface: ""

# OSPF: triangle (Gi1/Gi2/Gi3) + Gi4 lab cloud 10.0.0.0/24 — see csr_ospf_interfaces in each host_vars/*.yml (site_routing.yml).
# Gi4 IPv4 matches ansible_host in hosts.yml (syslog 10.0.0.21, TIGger 10.0.0.24 stay on same /24).

# playbooks/csr_cdp.yml — enable CDP on these interfaces (extend if your CSR has more GigabitEthernet N).
csr_cdp_interfaces:
  - GigabitEthernet1
  - GigabitEthernet2
  - GigabitEthernet3
  - GigabitEthernet4

# Phase A2 — SNMP (see playbooks/csr_snmp.yml, docs/monitoring/tig/snmp-ios-xe.md)
# Telemetry host that polls csr_lab ansible_host UDP/161 — match your infra/tig/README.md .
tigger_snmp_collector_ipv4: 10.0.0.24
# snmp-server RO uses this STANDARD numbered ACL (1–99 free range on lab CSRs — change if colliding).
csr_snmp_standard_acl_num: 87
# Purge prelude still removes these NAMED leftovers (extended IOS/XE quirks). Not used for snmp bind.
csr_snmp_acl_name: LAB-SNMP-V2XTND
