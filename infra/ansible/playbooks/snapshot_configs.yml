---
# Read-only baseline: startup + running configs, routing, OSPF state.
# Hybrid artifacts: numbered .txt (human diff) + telemetry.json per host + manifest.json (machine index).
# Saves under infra/ansible/artifacts/baselines/<UTC-timestamp>/ on the controller (gitignored snapshot data).
- name: Baseline snapshot — timestamp and output root on controller
  hosts: localhost
  gather_facts: false
  connection: local

  tasks:
    - name: Establish snapshot id and artifact root directory
      ansible.builtin.set_fact:
        network_baseline_id: "{{ lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ') }}"
        network_baseline_root: "{{ playbook_dir }}/../artifacts/baselines"

- name: Cisco CSR lab — capture configuration and routing baseline
  hosts: csr_lab
  gather_facts: false
  strategy: linear
  vars_files:
    - vars/baseline_snapshot_commands.yml

  vars:
    baseline_root: "{{ hostvars['localhost'].network_baseline_root }}"
    network_baseline_id: "{{ hostvars['localhost'].network_baseline_id }}"
    baseline_host_dir: "{{ baseline_root }}/{{ network_baseline_id }}/{{ inventory_hostname }}"

  tasks:
    - name: Ensure per-host snapshot directory exists on controller
      ansible.builtin.file:
        path: "{{ baseline_host_dir }}"
        state: directory
        mode: "0750"
      delegate_to: localhost

    - name: Write inventory metadata beside captured files
      ansible.builtin.copy:
        dest: "{{ baseline_host_dir }}/00_inventory_meta.txt"
        mode: "0640"
        content: |
          inventory_hostname: {{ inventory_hostname }}
          ansible_host: {{ ansible_host | default('', true) }}
          snapshot_id_utc: {{ network_baseline_id }}
          playbook: snapshot_configs.yml
      delegate_to: localhost

    - name: Terminal session — disable pager once per device
      cisco.ios.ios_command:
        commands:
          - terminal length 0

    - name: Capture IOS telemetry (one show command per loop iteration)
      cisco.ios.ios_command:
        commands:
          - "{{ snapshot_line.cmd }}"
      loop: "{{ snapshot_commands }}"
      loop_control:
        loop_var: snapshot_line
        label: "{{ snapshot_line.cmd }}"
      register: snapshot_gather
      ignore_errors: true

    - name: Write captured IOS output to artifact file on controller
      ansible.builtin.copy:
        dest: "{{ baseline_host_dir }}/{{ (artifact_row.snapshot_line | default({})).fn | default('unknown.txt') }}"
        mode: "0640"
        content: |-
          COMMAND: {{ (artifact_row.snapshot_line | default({})).cmd | default('') }}
          FAILED: {{ artifact_row.failed | default(false) | lower }}
          MSG: {{ artifact_row.msg | default('') }}

          {{ artifact_row.stdout_lines | default([]) | flatten | join('\n') }}
      loop: "{{ snapshot_gather.results | default([]) }}"
      loop_control:
        loop_var: artifact_row
        label: "{{ (artifact_row.snapshot_line | default({})).fn | default('artifact') }}"
      delegate_to: localhost

    - name: Build structured capture rows for telemetry.json
      ansible.builtin.set_fact:
        telemetry_captures: "{{ telemetry_captures | default([]) + [_capture_row] }}"
      vars:
        _sl: "{{ artifact_row.snapshot_line | default({}, true) }}"
        _lines: "{{ artifact_row.stdout_lines | default([]) | flatten }}"
        _capture_row:
          artifact: "{{ _sl.fn | default('') }}"
          command: "{{ _sl.cmd | default('') }}"
          ok: "{{ not (artifact_row.failed | default(false)) }}"
          msg: "{{ artifact_row.msg | default('', true) }}"
          stdout: "{{ _lines | join('\n') }}"
          stdout_lines: "{{ _lines }}"
      loop: "{{ snapshot_gather.results | default([]) }}"
      loop_control:
        loop_var: artifact_row

    - name: Write machine-readable telemetry (telemetry.json) on controller
      ansible.builtin.copy:
        dest: "{{ baseline_host_dir }}/telemetry.json"
        mode: "0640"
        content: "{{ telemetry_document | to_nice_json(sort_keys=true) }}"
      vars:
        telemetry_document:
          capture_format_version: 1
          snapshot_id_utc: "{{ network_baseline_id }}"
          inventory_hostname: "{{ inventory_hostname }}"
          ansible_host: "{{ ansible_host | default('', true) }}"
          playbook: snapshot_configs.yml
          captures: "{{ telemetry_captures }}"
      delegate_to: localhost

- name: Baseline snapshot — manifest + diff hints on controller
  hosts: localhost
  gather_facts: false
  connection: local
  vars_files:
    - vars/baseline_snapshot_commands.yml

  tasks:
    - name: Write MANIFEST describing snapshot layout for future diffs
      ansible.builtin.copy:
        mode: "0644"
        dest: "{{ hostvars.localhost.network_baseline_root }}/{{ hostvars.localhost.network_baseline_id }}/MANIFEST.txt"
        content: |
          basic_netai — network baseline snapshot
          snapshot_id_utc={{ hostvars.localhost.network_baseline_id }}
          root={{ hostvars.localhost.network_baseline_root }}/{{ hostvars.localhost.network_baseline_id }}

          Machine-readable catalogue: manifest.json (expected filenames + host list).

          Hybrid layout per host subdirectory:
          - numbered *.txt — verbatim IOS output with small human headers (diff-friendly)
          - telemetry.json — same captures as structured JSON (AI / jq / tooling)
          - 00_inventory_meta.txt — Ansible inventory fingerpost

          Per-device directories captured:
          {% for h in groups['csr_lab'] | sort %}
          - {{ h }}/
          {% endfor %}

          After an outage, compare snapshots with unified diffs:

            cd infra/ansible && \
            diff -u \
              artifacts/baselines/<BASELINE>/csr01/30_running-config.txt \
              artifacts/baselines/<LATER>/csr01/30_running-config.txt

            cd infra/ansible && \
            diff -u \
              artifacts/baselines/<BASELINE>/csr01/82_show_ip_ospf_neighbor_detail.txt \
              artifacts/baselines/<LATER>/csr01/82_show_ip_ospf_neighbor_detail.txt

          Heuristic: 30_* (configuration) plus 70_*–84_* (routes + OSPF) expose most regressions affecting neighbors.

          For scripting / agents, jq against telemetry.json instead of scraping headers in *.txt files.

    - name: Machine-readable manifest manifest.json
      ansible.builtin.copy:
        mode: "0644"
        dest: "{{ hostvars.localhost.network_baseline_root }}/{{ hostvars.localhost.network_baseline_id }}/manifest.json"
        content: "{{ baseline_manifest | to_nice_json(sort_keys=true) }}"
      vars:
        baseline_manifest:
          snapshot_format_version: 1
          snapshot_id_utc: "{{ hostvars.localhost.network_baseline_id }}"
          artifact_root_absolute: "{{ hostvars.localhost.network_baseline_root }}/{{ hostvars.localhost.network_baseline_id }}"
          hosts_expected: "{{ groups['csr_lab'] | sort | list }}"
          expected_text_filenames: "{{ snapshot_commands | map(attribute='fn') | list }}"
          per_host_additional_files:
            - "00_inventory_meta.txt"
            - "telemetry.json"
          companion_human_manifest: MANIFEST.txt
