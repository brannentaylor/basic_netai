---
# Shared snapshot command ordering — keep in sync with snapshot_configs.yml goals.
snapshot_commands:
  - { fn: "10_clock.txt", cmd: "show clock" }
  - { fn: "20_show_version.txt", cmd: "show version" }
  - { fn: "30_running-config.txt", cmd: "show running-config" }
  - { fn: "40_startup-config.txt", cmd: "show startup-config" }
  - { fn: "50_show_ip_interface_brief.txt", cmd: "show ip interface brief" }
  - { fn: "60_show_interfaces_description.txt", cmd: "show interfaces description" }
  - { fn: "70_show_ip_route.txt", cmd: "show ip route" }
  - { fn: "71_show_ip_route_ospf.txt", cmd: "show ip route ospf" }
  - { fn: "72_show_ipv6_route.txt", cmd: "show ipv6 route" }
  - { fn: "80_show_ip_protocols_section_ospf.txt", cmd: "show ip protocols | section ospf" }
  - { fn: "81_show_ip_ospf_interface_brief.txt", cmd: "show ip ospf interface brief" }
  - { fn: "82_show_ip_ospf_neighbor_detail.txt", cmd: "show ip ospf neighbor detail" }
  - { fn: "83_show_ip_ospf_database_database-summary.txt", cmd: "show ip ospf database database-summary" }
