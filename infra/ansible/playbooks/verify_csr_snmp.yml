---
# Read-only — confirm snmp stanza + standard ACL {{ csr_snmp_standard_acl_num }}.

- name: Cisco CSR - verify SNMP lab snippets
  hosts: csr_lab
  gather_facts: false

  tasks:
    - name: Numbered standard ACL {{ csr_snmp_standard_acl_num }}
      cisco.ios.ios_command:
        commands:
          - show ip access-list {{ csr_snmp_standard_acl_num }}
      register: verify_snmp_acl

    - name: Full running-config for snmp substring
      cisco.ios.ios_command:
        commands:
          - terminal length 0
          - show running-config
      register: verify_run_full

    - ansible.builtin.set_fact:
        verify_run_plain: "{{ ([verify_run_full.stdout | default('')]) | flatten | join('\n') }}"

    - name: running-config probe size
      ansible.builtin.debug:
        msg: "running-config length={{ verify_run_plain | length }} chars"

    - name: Print numbered ACL
      ansible.builtin.debug:
        var: verify_snmp_acl.stdout_lines

    - name: Require snmp-server community stanza
      ansible.builtin.assert:
        that:
          - "'snmp-server community' in verify_run_plain"
        fail_msg: >-
          No `snmp-server community` substring in running-config. Re-run playbooks/csr_snmp.yml (--diff).
