---
# Apply Gi1 transit + OSPF area 0 (see group_vars + host_vars).
- name: Cisco CSR — Gi1 + OSPF
  hosts: csr_lab
  gather_facts: false
  tasks:
    - name: Render IOS-XE Gi1 / OSPF stanza
      cisco.ios.ios_config:
        src: "{{ playbook_dir }}/../templates/iosxe_gi1_ospf.j2"
        save_when: changed
