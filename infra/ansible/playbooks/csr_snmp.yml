---
# Phase A2 — SNMP read-only for Influx telemetry (TIGger polls CSRs).
# Community string MUST come from the environment — never committed.
#
# Prerequisites: CSR management reachable from Ansible control node;
#               Tigger (10.x) can reach csr_lab ansible_host with UDP 161 open on CSR.
#
# Export CSR_SNMP_RO_COMMUNITY (same value configured on routers and on Tigger .env SNMP_RO_COMMUNITY).
- name: Cisco CSR — SNMP lab (ACL + RO community)
  hosts: csr_lab
  gather_facts: false
  vars:
    csr_snmp_ro_community: "{{ lookup('env', 'CSR_SNMP_RO_COMMUNITY') | default('', true) }}"
  tasks:
    - name: Fail if SNMP RO community missing from env
      ansible.builtin.assert:
        that:
          - csr_snmp_ro_community | length > 0
        fail_msg: >-
          Set CSR_SNMP_RO_COMMUNITY before running this playbook (lab-only RO string shared with Telegraf SNMP_RO_COMMUNITY on Tigger).
          Example: export CSR_SNMP_RO_COMMUNITY='your-lab-ro'

    # ACL submode first, then global `snmp-server` (do not splice with `!` — that can exit config so
    # `snmp-server` never lands in running-config). Prefer parents/lines over a monolithic `src` blob.
    - name: Telemetry extended ACL (SNMP source = Tigger only)
      cisco.ios.ios_config:
        lines:
          - remark SNMP RO - Tigger telemetry {{ tigger_snmp_collector_ipv4 }}
          - permit udp host {{ tigger_snmp_collector_ipv4 }} any eq snmp
          - deny ip any any
        parents:
          - ip access-list extended {{ csr_snmp_acl_name }}
        save_when: changed

    - name: SNMPv2c read-only community bound to telemetry ACL
      cisco.ios.ios_config:
        lines:
          - snmp-server community {{ csr_snmp_ro_community }} RO {{ csr_snmp_acl_name }}
        save_when: changed
