---
# Phase A2 — SNMP read-only for Influx telemetry (TIGger polls CSRs).
# Community string MUST come from the environment — never committed.
#
# Export CSR_SNMP_RO_COMMUNITY (same value as SNMP_RO_COMMUNITY on Tigger).
#
# Lab drift: "could not be allocated / incompatible type" persists if SNMP still references the ACL name.
# Prelude runs `no snmp-server` (drops all snmp-server config on the router), then strips standard|extended|ipv6
# named lists for csr_snmp_acl_name. Lab-only — do not run against production SNMP you need to keep.
#
# failed_when uses lowercase substring checks (no bare "%" in expressions — breaks Ansible templating).
- name: Cisco CSR - SNMP lab (ACL + RO community)
  hosts: csr_lab
  gather_facts: false
  vars:
    csr_snmp_ro_community: "{{ lookup('env', 'CSR_SNMP_RO_COMMUNITY') | default('', true) | trim }}"
  tasks:
    - name: Fail if SNMP RO community missing from env
      ansible.builtin.assert:
        that:
          - csr_snmp_ro_community | length > 0
        fail_msg: >-
          Set CSR_SNMP_RO_COMMUNITY before running this playbook (lab-only RO string shared with Telegraf SNMP_RO_COMMUNITY on Tigger).
          Example: export CSR_SNMP_RO_COMMUNITY='your-lab-ro'

    - name: Strip SNMP agent + telemetry ACL stubs (lab — removes all snmp-server config on device)
      cisco.ios.ios_command:
        commands:
          - configure terminal
          - no snmp-server
          - no ip access-list extended {{ csr_snmp_acl_name }}
          - no ip access-list standard {{ csr_snmp_acl_name }}
          - no ipv6 access-list {{ csr_snmp_acl_name }}
          - end
      ignore_errors: true

    - name: Flush connection after snmp/acl prelude
      ansible.builtin.meta: reset_connection

    - name: Telemetry extended ACL (SNMP source = Tigger only)
      cisco.ios.ios_config:
        lines:
          - remark SNMP RO - Tigger telemetry {{ tigger_snmp_collector_ipv4 }}
          - permit udp host {{ tigger_snmp_collector_ipv4 }} any eq snmp
          - deny ip any any
        parents:
          - ip access-list extended {{ csr_snmp_acl_name }}
        save_when: changed

    - name: Flush network connection before snmp stanza probe / apply
      ansible.builtin.meta: reset_connection

    - name: Slurp running-config for snmp stanza probe
      cisco.ios.ios_command:
        commands:
          - terminal length 0
          - show running-config
      register: full_running

    - name: Normalize running-config text for snmp probe
      ansible.builtin.set_fact:
        full_running_plain: "{{ ([full_running.stdout | default('')]) | flatten | join('\n') }}"

    - name: Detect snmp-server community substring
      ansible.builtin.set_fact:
        snmp_has_community_line: "{{ 'snmp-server community' in full_running_plain }}"

    - name: Apply snmp-server community (explicit conf t) when missing
      when: not snmp_has_community_line | bool
      cisco.ios.ios_command:
        commands:
          - configure terminal
          - snmp-server community "{{ csr_snmp_ro_community }}" RO {{ csr_snmp_acl_name }}
          - end
          - write memory
      register: snmp_apply
      # Substrings only (no stray "% …" literals — Ansible templating chokes). One expression = explicit OR.
      failed_when:
        - >-
          (
          ('could not be allocated' in (((snmp_apply.stdout_lines | default([]) | flatten | join('\n')) ~ (snmp_apply.stderr | default(''))) | lower))
          or ('incompatible type' in (((snmp_apply.stdout_lines | default([]) | flatten | join('\n')) ~ (snmp_apply.stderr | default(''))) | lower))
          or ('incomplete' in (((snmp_apply.stdout_lines | default([]) | flatten | join('\n')) ~ (snmp_apply.stderr | default(''))) | lower))
          or ('invalid' in (((snmp_apply.stdout_lines | default([]) | flatten | join('\n')) ~ (snmp_apply.stderr | default(''))) | lower))
          )

    - name: snmp-server already present - apply skipped
      ansible.builtin.debug:
        msg: "Probe found snmp-server in running-config."
        verbosity: 1
      when: snmp_has_community_line | bool
