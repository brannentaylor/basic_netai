# basic_netai — receive CSR syslog (lab UDP/514 cleartext).
# Pair with infra/ansible playbook + firewall rules in docs/monitoring/syslog.md.
#
# IMPORTANT: UDP must use its own ruleset. A naked "*.* omfile …" attaches to the
# default ruleset as well and would duplicate every LOCAL OS syslog line into all.log.

$WorkDirectory /var/spool/rsyslog

$FileCreateMode 0640
$DirCreateMode 0755

module(load="imudp")

ruleset(name="basicNetaiRemoteUdp") {
  *.* action(type="omfile" file="/var/log/network-lab/all.log")
}

input(type="imudp" port="514" ruleset="basicNetaiRemoteUdp")
