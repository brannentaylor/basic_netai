# basic_netai — receive CSR syslog (lab UDP/514 cleartext).
# Pair with infra/ansible playbook + firewall rules in docs/monitoring/syslog.md.

module(load="imudp")
input(type="imudp" port="514")

$WorkDirectory /var/spool/rsyslog

$FileCreateMode 0640
$DirCreateMode 0755

# Canonical combined log (agents may tail with substring limits — see docs/agent-ops/safety.md).
*.* action(type="omfile" file="/var/log/network-lab/all.log")
